<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Algo Fanafody{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="app-bg">
    <nav class="navbar navbar-expand-xl bg-white border-bottom shadow-sm sticky-top">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand fw-bold brandmark" href="{{ url_for('home.index') }}">
                <i class="bi bi-capsule-pill me-2"></i>Algo Fanafody
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-xl-0 align-items-xl-center gap-xl-1">
                    <li class="nav-item">
                        <a class="nav-link nav-pill {% if active_page == 'home' %}active{% endif %}" href="{{ url_for('home.index') }}">
                            <i class="bi bi-house-door me-1"></i>Accueil
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-pill {% if active_page == 'medicaments' %}active{% endif %}" href="{{ url_for('medicament.index') }}">
                            <i class="bi bi-capsule me-1"></i>Medicaments
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-pill {% if active_page == 'symptomes' %}active{% endif %}" href="{{ url_for('symptome.index') }}">
                            <i class="bi bi-activity me-1"></i>Symptomes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-pill {% if active_page == 'prescriptions' %}active{% endif %}" href="{{ url_for('prescription.index') }}">
                            <i class="bi bi-file-earmark-medical me-1"></i>Prescriptions
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-pill {% if active_page == 'param_medicaments' %}active{% endif %}" href="{{ url_for('param_medicament.index') }}">
                            <i class="bi bi-link-45deg me-1"></i>Param medicament
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-pill {% if active_page == 'param_prescriptions' %}active{% endif %}" href="{{ url_for('param_prescription.index') }}">
                            <i class="bi bi-diagram-3 me-1"></i>Param prescription
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4 py-lg-5">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
